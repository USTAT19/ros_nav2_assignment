amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map

    scan_topic: /scan

    min_particles: 500
    max_particles: 2000

    update_min_d: 0.2
    update_min_a: 0.2

    resample_interval: 1
    transform_tolerance: 1.0

    laser_max_range: 100.0
    laser_model_type: likelihood_field

    set_initial_pose: true
